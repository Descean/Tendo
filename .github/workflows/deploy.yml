name: Deploy Tendo to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:  # Permet le declenchement manuel

jobs:
  test:
    name: Verification syntaxe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Python syntax
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/services/claude.py
          python -m py_compile app/services/whatsapp.py
          python -m py_compile app/routers/webhook.py
          python -m py_compile app/config.py
          echo "Syntaxe Python OK"

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /opt/tendo

            echo "[Deploy] Pull des derniers changements..."
            git pull origin main

            echo "[Deploy] Rebuild des containers..."
            docker compose up -d --build

            echo "[Deploy] Attente du demarrage (15s)..."
            sleep 15

            echo "[Deploy] Verification sante..."
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "[Deploy] Tendo est operationnel !"
                curl -s http://localhost:8000/health
                exit 0
              fi
              echo "[Deploy] Tentative $i/5 - en attente..."
              sleep 5
            done

            echo "[Deploy] ERREUR: Tendo ne repond pas apres 5 tentatives"
            docker compose logs --tail=30 tendo
            exit 1

      - name: Notify success
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "[Tendo] Deploiement reussi a $(date '+%Y-%m-%d %H:%M:%S')" >> /opt/tendo/deploy.log
